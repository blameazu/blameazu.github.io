title: Blame's Blog
description: Hello

remote_theme: "mmistakes/minimal-mistakes@4.26.2"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed

paginate: 10
paginate_path: "/page:num/"

author:
  name: Blame
  avatar: /assets/images/avatar.png
  bio: "A place to record my exp or editorial"

markdown: kramdown
kramdown:
  math_engine: mathjax
  math_engine_opts: {}